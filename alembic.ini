# AlphaSync — Alembic configuration
# Referência: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
script_location = migrations

# Formato do nome dos arquivos de migration
# %(year)d %(month).2d %(day).2d %(hour).2d %(minute).2d %(second).2d %(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone para timestamps nos arquivos gerados
timezone = UTC

# Truncate long revision IDs? No.
truncate_slug_length = 40

# Revisão usada como ponto de partida para generate (não alterar)
revision_environment = false

# Não usar revisão "true" no default
sourceless = false

# encoding de saída do script
output_encoding = utf-8

# URL do banco — sobrescrita pelo env.py via settings
sqlalchemy.url = postgresql://alphasync:alphasync@localhost:5432/alphasync


[post_write_hooks]
# hooks opcionais depois de gerar migration
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
