services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: alphasync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alphasync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alphasync}
      POSTGRES_DB: ${POSTGRES_DB:-alphasync}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alphasync} -d ${POSTGRES_DB:-alphasync}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - alphasync

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alphasync_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - alphasync

  # ── Backend (FastAPI + Gunicorn) ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: alphasync_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-alphasync}:${POSTGRES_PASSWORD:-alphasync}@postgres:5432/${POSTGRES_DB:-alphasync}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - storage_data:/app/storage
    networks:
      - alphasync
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (React + Nginx estático) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alphasync_frontend
    restart: unless-stopped
    networks:
      - alphasync
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: alphasync_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      # - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - alphasync

  # ── Migrations (job único — roda e sai) ───────────────────────────────────────
  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: alphasync_migrations
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-alphasync}:${POSTGRES_PASSWORD:-alphasync}@postgres:5432/${POSTGRES_DB:-alphasync}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alphasync
    profiles:
      - migrate

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local

networks:
  alphasync:
    driver: bridge