# =============================================================================
# AlphaSync — VPS 3 (DATABASE)
# PostgreSQL com volume persistente
#
# SEGURANÇA:
#   - Porta 5432 NÃO exposta publicamente (sem ports: directive)
#   - Aceita conexões apenas via IP privado da VPS
#   - Firewall: liberar 5432 apenas para IPs das VPS 2 e VPS 4
#
# Subir: docker compose up -d
# Backup: ./backup.sh
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: alphasync_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    # IMPORTANTE: sem "ports:" — banco só acessível via IP privado da VPS
    # Para aceitar conexões externas, configure em postgresql.conf:
    # listen_addresses = '*' (padrão da imagem Docker — já habilitado)
    # E em pg_hba.conf via POSTGRES_HOST_AUTH_METHOD
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    # Segurança: rodar como usuário não-root
    user: "70:70"
    shm_size: '256mb'
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c log_min_duration_statement=500

volumes:
  postgres_data:
    driver: local
